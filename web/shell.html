<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Treasure Quest: Seven Islands</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#game-header {
    text-align: center;
    padding: 8px;
    font-size: 14px;
    color: #888;
}

#canvas-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

canvas#canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #333;
    border-radius: 4px;
    max-width: 100vw;
    max-height: 50vh;
}

/* ── Touch Controls ─────────────────────────────── */
#touch-controls {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 12px 16px;
    justify-content: space-between;
    align-items: center;
}

/* D-Pad */
#dpad {
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 2px;
}

.dpad-btn {
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
}
.dpad-btn:active, .dpad-btn.pressed {
    background: rgba(255,255,255,0.35);
}
.dpad-empty { background: transparent; }

/* Action Buttons */
#action-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
}

#ab-row {
    display: flex;
    gap: 12px;
}

.action-btn {
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 700;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
}
.action-btn:active, .action-btn.pressed {
    filter: brightness(1.4);
}

.btn-a { background: #e74c3c; color: #fff; }
.btn-b { background: #f39c12; color: #fff; }

#meta-row {
    display: flex;
    gap: 8px;
}

.meta-btn {
    padding: 6px 16px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    color: #ccc;
    font-size: 11px;
    -webkit-tap-highlight-color: transparent;
}
.meta-btn:active, .meta-btn.pressed {
    background: rgba(255,255,255,0.35);
}

#shoulder-row {
    display: flex;
    width: 100%;
    max-width: 480px;
    justify-content: space-between;
    padding: 4px 16px;
}

.shoulder-btn {
    padding: 8px 24px;
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
}
.shoulder-btn:active, .shoulder-btn.pressed {
    background: rgba(255,255,255,0.3);
}

/* Loading */
#loading {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading h1 { font-size: 20px; margin-bottom: 16px; }
#progress-bar {
    width: 200px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
}
#progress-fill {
    height: 100%;
    background: #e74c3c;
    width: 0%;
    transition: width 0.2s;
}

/* Desktop: hide touch controls */
@media (hover: hover) and (pointer: fine) {
    #touch-controls { display: none !important; }
    #shoulder-row { display: none !important; }
    #game-header::after {
        content: ' — Z/X: A/B, Arrow Keys: Move, Enter: Start';
        font-size: 12px;
    }
}
/* Mobile: show touch controls */
@media (hover: none), (pointer: coarse) {
    #touch-controls { display: flex; }
    #shoulder-row { display: flex; }
    canvas#canvas { max-height: 40vh; }
}
</style>
</head>
<body>

<div id="loading">
    <h1>Treasure Quest: Seven Islands</h1>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <p style="margin-top:12px;color:#666;font-size:12px">Loading...</p>
</div>

<div id="game-header">Treasure Quest: Seven Islands</div>

<div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
</div>

<div id="shoulder-row">
    <button class="shoulder-btn" data-key="KeyQ">L</button>
    <button class="shoulder-btn" data-key="KeyE">R</button>
</div>

<div id="touch-controls">
    <div id="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowUp">&#9650;</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowLeft">&#9664;</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowRight">&#9654;</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowDown">&#9660;</button>
        <div class="dpad-empty"></div>
    </div>
    <div id="action-btns">
        <div id="ab-row">
            <button class="action-btn btn-b" data-key="KeyX">B</button>
            <button class="action-btn btn-a" data-key="KeyZ">A</button>
        </div>
        <div id="meta-row">
            <button class="meta-btn" data-key="Backspace">SELECT</button>
            <button class="meta-btn" data-key="Enter">START</button>
        </div>
    </div>
</div>

<script>
// Touch → Keyboard event injection
(function() {
    const buttons = document.querySelectorAll('[data-key]');
    const activeKeys = new Set();

    function sendKey(code, type) {
        const ev = new KeyboardEvent(type, {
            code: code,
            key: code,
            bubbles: true,
            cancelable: true
        });
        document.dispatchEvent(ev);
    }

    function handleStart(e) {
        e.preventDefault();
        const key = e.currentTarget.dataset.key;
        if (!activeKeys.has(key)) {
            activeKeys.add(key);
            e.currentTarget.classList.add('pressed');
            sendKey(key, 'keydown');
        }
    }

    function handleEnd(e) {
        e.preventDefault();
        const key = e.currentTarget.dataset.key;
        activeKeys.delete(key);
        e.currentTarget.classList.remove('pressed');
        sendKey(key, 'keyup');
    }

    buttons.forEach(btn => {
        btn.addEventListener('touchstart', handleStart, { passive: false });
        btn.addEventListener('touchend', handleEnd, { passive: false });
        btn.addEventListener('touchcancel', handleEnd, { passive: false });
        // Mouse fallback for testing
        btn.addEventListener('mousedown', handleStart);
        btn.addEventListener('mouseup', handleEnd);
        btn.addEventListener('mouseleave', handleEnd);
    });
})();
</script>

<script>
// Module config MUST be set BEFORE the Emscripten script loads
var Module = {
    canvas: (function() { return document.getElementById('canvas'); })(),
    onRuntimeInitialized: function() {
        document.getElementById('loading').classList.add('hidden');
        setTimeout(function() {
            document.getElementById('loading').style.display = 'none';
        }, 400);
    },
    setStatus: function(text) {
        if (text === '') {
            // Final status — loading complete
            document.getElementById('progress-fill').style.width = '100%';
            return;
        }
        var m = text.match(/(\d+)\/(\d+)/);
        if (m) {
            var pct = (parseInt(m[1]) / parseInt(m[2])) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
        }
    },
    monitorRunDependencies: function(left) {
        if (left === 0) {
            document.getElementById('progress-fill').style.width = '100%';
        }
    }
};
</script>

</body>
</html>
